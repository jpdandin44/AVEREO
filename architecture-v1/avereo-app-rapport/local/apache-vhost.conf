<VirtualHost *:80>
    ServerName rapport.avereo.localhost
    ServerAlias localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rapport-error.log
    CustomLog ${APACHE_LOG_DIR}/rapport-access.log combined
</VirtualHost>
