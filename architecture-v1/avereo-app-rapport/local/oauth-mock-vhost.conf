<VirtualHost *:80>
    ServerName oauth-rapport.avereo.localhost
    ServerAlias localhost
    DocumentRoot /var/www/html
    SetEnvIfNoCase Authorization "^(.*)" HTTP_AUTHORIZATION=$1

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/oauth-mock-error.log
    CustomLog ${APACHE_LOG_DIR}/oauth-mock-access.log combined
</VirtualHost>
