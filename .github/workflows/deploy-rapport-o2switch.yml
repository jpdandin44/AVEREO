name: Deploy Rapport to O2Switch

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-rapport-o2switch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: rapport
    defaults:
      run:
        working-directory: architecture-v1/avereo-app-rapport/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: architecture-v1/avereo-app-rapport/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_ENABLE_ONLINE_SYNC: "false"
        run: npm run build

      - name: Prepare static preview artifact
        run: |
          set -euo pipefail
          mkdir -p deploy-preview
          cp -R dist/assets deploy-preview/assets
          cp dist/index.html deploy-preview/index.html
          cp preview/.htaccess deploy-preview/.htaccess

      - name: Verify deployment artifact
        run: |
          set -euo pipefail
          test -s deploy-preview/index.html
          test -s deploy-preview/.htaccess
          test -d deploy-preview/assets
          test ! -e deploy-preview/api
          test ! -e deploy-preview/auth

      - name: Resolve FTPS target directory
        id: ftp-target
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_SERVER: ${{ secrets.CPANEL_SERVER }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
        run: |
          set -euo pipefail
          server_dir="$(python3 "$GITHUB_WORKSPACE/.github/scripts/cpanel-domain-docroot.py" "rapport.avereo.fr")"
          server_dir="${server_dir#/}"
          server_dir="${server_dir%/}/"
          if [ "$server_dir" = "/" ]; then
            echo "Resolved FTPS target directory is empty." >&2
            exit 1
          fi
          echo "server_dir=$server_dir" >> "$GITHUB_OUTPUT"
          echo "Resolved FTPS target directory: $server_dir"

      - name: Deploy with FTPS
        env:
          FTP_LOCAL_DIR: ${{ github.workspace }}/architecture-v1/avereo-app-rapport/frontend/deploy-preview
          FTP_PASSWORD: ${{ secrets.O2SWITCH_FTP_PASSWORD || secrets.CPANEL_PASSWORD }}
          FTP_PORT: ${{ vars.O2SWITCH_FTP_PORT || '21' }}
          FTP_PROTOCOL: ftps
          FTP_SERVER: ${{ secrets.O2SWITCH_FTP_SERVER || secrets.CPANEL_SERVER }}
          FTP_SERVER_DIR: ${{ steps.ftp-target.outputs.server_dir }}
          FTP_USERNAME: ${{ secrets.O2SWITCH_FTP_USER || secrets.CPANEL_USERNAME }}
        run: python3 "$GITHUB_WORKSPACE/.github/scripts/ftps-deploy-dir.py"

      - name: Verify public deployment
        run: bash "$GITHUB_WORKSPACE/.github/scripts/verify-public-spa.sh" "rapport" "https://rapport.avereo.fr/"

      - name: Verify preview blocks private endpoints
        run: |
          set -euo pipefail
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' 'https://rapport.avereo.fr/api/health.php')" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' 'https://rapport.avereo.fr/auth/callback/')" = "404"
