name: Deploy Coupe to O2Switch

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "architecture-v1/avereo-app-coupe/frontend/**"
      - ".github/workflows/deploy-coupe-o2switch.yml"

permissions:
  contents: read

concurrency:
  group: deploy-coupe-o2switch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: coupe
    defaults:
      run:
        working-directory: architecture-v1/avereo-app-coupe/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        run: npm run build

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.O2SWITCH_SSH_KEY }}

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          PORT="${{ secrets.O2SWITCH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=no" \
            ./dist/ \
            "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH }}/"
