name: Deploy Coupe to O2Switch

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "architecture-v1/avereo-app-coupe/frontend/**"
      - ".github/workflows/deploy-coupe-o2switch.yml"
      - ".github/scripts/**"

permissions:
  contents: read

concurrency:
  group: deploy-coupe-o2switch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: coupe
    defaults:
      run:
        working-directory: architecture-v1/avereo-app-coupe/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        run: npm run build

      - name: Resolve FTPS target directory
        id: ftp-target
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_SERVER: ${{ secrets.CPANEL_SERVER }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
        run: |
          set -euo pipefail
          server_dir="$(python3 "$GITHUB_WORKSPACE/.github/scripts/cpanel-domain-docroot.py" "coupe.avereo.fr")"
          server_dir="${server_dir#/}"
          server_dir="${server_dir%/}/"
          if [ "$server_dir" = "/" ]; then
            echo "Resolved FTPS target directory is empty." >&2
            exit 1
          fi
          echo "server_dir=$server_dir" >> "$GITHUB_OUTPUT"
          echo "Resolved FTPS target directory: $server_dir"

      - name: Deploy with FTPS
        env:
          FTP_LOCAL_DIR: ${{ github.workspace }}/architecture-v1/avereo-app-coupe/frontend/dist
          FTP_PASSWORD: ${{ secrets.O2SWITCH_FTP_PASSWORD || secrets.CPANEL_PASSWORD }}
          FTP_PORT: ${{ vars.O2SWITCH_FTP_PORT || '21' }}
          FTP_PROTOCOL: ftps
          FTP_SERVER: ${{ secrets.O2SWITCH_FTP_SERVER || secrets.CPANEL_SERVER }}
          FTP_SERVER_DIR: ${{ steps.ftp-target.outputs.server_dir }}
          FTP_USERNAME: ${{ secrets.O2SWITCH_FTP_USER || secrets.CPANEL_USERNAME }}
        run: python3 "$GITHUB_WORKSPACE/.github/scripts/ftps-deploy-dir.py"

      - name: Verify public deployment
        run: bash "$GITHUB_WORKSPACE/.github/scripts/verify-public-spa.sh" "coupe" "https://coupe.avereo.fr/"
