name: Deploy Coupe to O2Switch

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "architecture-v1/avereo-app-coupe/frontend/**"
      - ".github/workflows/deploy-coupe-o2switch.yml"
      - ".github/scripts/**"

permissions:
  contents: read

concurrency:
  group: deploy-coupe-o2switch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: coupe
    defaults:
      run:
        working-directory: architecture-v1/avereo-app-coupe/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        run: npm run build

      - name: Get runner public IP
        id: runner-ip
        run: |
          set -euo pipefail
          echo "ipv4=$(curl -fsS https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP in cPanel
        env:
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_SERVER: ${{ secrets.CPANEL_SERVER }}
          O2SWITCH_PORT: ${{ secrets.O2SWITCH_PORT }}
          RUNNER_IPV4: ${{ steps.runner-ip.outputs.ipv4 }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/cpanel-ssh-whitelist.sh" add

      - name: Confirm runner IP is whitelisted
        env:
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_SERVER: ${{ secrets.CPANEL_SERVER }}
          O2SWITCH_PORT: ${{ secrets.O2SWITCH_PORT }}
          RUNNER_IPV4: ${{ steps.runner-ip.outputs.ipv4 }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/cpanel-ssh-whitelist.sh" list

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.O2SWITCH_SSH_KEY }}

      - name: Validate remote target path
        run: |
          set -euo pipefail
          PORT="${{ secrets.O2SWITCH_PORT }}"
          if [ -z "$PORT" ]; then PORT=8888; fi
          TARGET="${{ secrets.O2SWITCH_TARGET_PATH }}"
          if [ -z "$TARGET" ]; then
            echo "O2SWITCH_TARGET_PATH secret is required for environment 'coupe'." >&2
            exit 1
          fi
          ssh -o BatchMode=yes \
            -o PasswordAuthentication=no \
            -o StrictHostKeyChecking=no \
            -p "${PORT}" \
            "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}" \
            "mkdir -p \"$TARGET\" && test -w \"$TARGET\" && pwd"

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          PORT="${{ secrets.O2SWITCH_PORT }}"
          if [ -z "$PORT" ]; then PORT=8888; fi
          TARGET="${{ secrets.O2SWITCH_TARGET_PATH }}"
          if [ -z "$TARGET" ]; then
            echo "O2SWITCH_TARGET_PATH secret is required for environment 'coupe'." >&2
            exit 1
          fi
          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=no" \
            ./dist/ \
            "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${TARGET}/"

      - name: Verify public deployment
        env:
          O2SWITCH_PUBLIC_URL: ${{ vars.O2SWITCH_PUBLIC_URL }}
        run: |
          PUBLIC_URL="${O2SWITCH_PUBLIC_URL:-https://coupe.avereo.fr/}"
          bash "$GITHUB_WORKSPACE/.github/scripts/verify-public-spa.sh" "coupe" "$PUBLIC_URL"

      - name: Remove runner IP from cPanel whitelist
        if: always()
        env:
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_SERVER: ${{ secrets.CPANEL_SERVER }}
          O2SWITCH_PORT: ${{ secrets.O2SWITCH_PORT }}
          RUNNER_IPV4: ${{ steps.runner-ip.outputs.ipv4 }}
        run: |
          set -euo pipefail
          if [ -z "${RUNNER_IPV4:-}" ]; then
            echo "No runner IP available; skipping cPanel whitelist cleanup."
            exit 0
          fi
          bash "$GITHUB_WORKSPACE/.github/scripts/cpanel-ssh-whitelist.sh" remove || \
            echo "::warning::Unable to remove runner IP from cPanel whitelist automatically. Please clean stale GitHub runner IPs manually if the whitelist limit is reached."
