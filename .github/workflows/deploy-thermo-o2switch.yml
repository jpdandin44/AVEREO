name: Deploy Thermo to O2Switch

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "architecture-v1/avereo-app-thermo/frontend/**"
      - ".github/workflows/deploy-thermo-o2switch.yml"

permissions:
  contents: read

concurrency:
  group: deploy-thermo-o2switch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: thermo
    defaults:
      run:
        working-directory: architecture-v1/avereo-app-thermo/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        run: npm run build

      - name: Get runner public IP
        id: runner-ip
        run: |
          set -euo pipefail
          echo "ipv4=$(curl -fsS https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP in cPanel
        run: |
          set -euo pipefail
          PORT="${{ secrets.O2SWITCH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          curl -fsS -m 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.runner-ip.outputs.ipv4 }}&port=${PORT}"

      - name: Confirm runner IP is whitelisted
        run: |
          set -euo pipefail
          curl -fsS -m 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list" | grep "${{ steps.runner-ip.outputs.ipv4 }}"

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.O2SWITCH_SSH_KEY }}

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          PORT="${{ secrets.O2SWITCH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=no" \
            ./dist/ \
            "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH }}/"
